esphome:
  name: atom-echo-assistant
  friendly_name: Atom Echo Assistant
  platformio_options:
    board_build.flash_mode: dio

esp32:
  board: m5stack-atom
  framework:
    type: esp-idf

logger:
  level: INFO

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none

ota:
  - platform: esphome
    password: !secret ota_password

api:
  reboot_timeout: 0s

# I2S audio bus (shared between mic and speaker)
i2s_audio:
  - id: i2s_shared
    i2s_lrclk_pin: GPIO33
    i2s_bclk_pin: GPIO19

# Microphone (SPM1423 PDM)
microphone:
  - platform: i2s_audio
    id: atom_mic
    i2s_audio_id: i2s_shared
    i2s_din_pin: GPIO23
    adc_type: external
    pdm: true
    sample_rate: 16000
    bits_per_sample: 16bit
    channel: left

# Speaker (NS4168 I2S amp)
speaker:
  - platform: i2s_audio
    id: atom_speaker
    i2s_audio_id: i2s_shared
    i2s_dout_pin: GPIO22
    dac_type: external
    sample_rate: 16000
    bits_per_sample: 16bit
    channel: mono

# Status LED (SK6812 on GPIO27)
light:
  - platform: esp32_rmt_led_strip
    id: status_led
    pin: GPIO27
    num_leds: 1
    rmt_channel: 0
    chipset: SK6812
    rgb_order: GRB
    default_transition_length: 0s
    effects:
      - pulse:
          name: "Pulse"
          transition_length: 300ms
          update_interval: 300ms

# Button (GPIO39) — push-to-talk
binary_sensor:
  - platform: gpio
    id: button
    pin:
      number: GPIO39
      inverted: true
    on_press:
      then:
        - light.turn_on:
            id: status_led
            red: 100%
            green: 0%
            blue: 0%
            brightness: 80%
        - lambda: 'id(voice).start_recording();'
    on_release:
      then:
        - lambda: 'id(voice).stop_recording();'

# Custom voice client component
external_components:
  - source:
      type: local
      path: components

voice_client:
  id: voice
  microphone: atom_mic
  speaker: atom_speaker
  led: status_led
  api_url: !secret voice_api_url
  api_token: !secret voice_api_token
  max_record_seconds: 4
